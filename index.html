<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Study Planner</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #ffffff;
            margin: 20px;
            color: #000;
        }
        .header-title {
            text-align: center;
            letter-spacing: 3px;
            font-weight: bold;
            font-size: 24px;
            margin-bottom: 30px;
        }
        .container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            max-width: 900px;
            margin: 0 auto;
        }
        .box {
            border: 1px solid #000;
            margin-bottom: 20px;
            background: #fff;
        }
        .yellow-header {
            background-color: #fdf1a9; 
            padding: 8px;
            font-weight: bold;
            font-size: 14px;
            border-bottom: 1px solid #000;
            text-align: center;
            letter-spacing: 1px;
        }
        input[type="text"], input[type="time"], textarea {
            font-size: 14px; 
            color: #000;
            border: none;
            outline: none;
            font-family: inherit;
            background: transparent;
        }
        .row {
            display: flex;
            border-bottom: 1px solid #000;
        }
        .row:last-child {
            border-bottom: none;
        }
        .row input[type="text"] {
            padding: 8px;
            width: 100%;
            box-sizing: border-box;
        }
        .row input[type="time"] {
            padding: 8px;
        }
        .flex-row {
            display: flex;
        }
        .checkbox-cell {
            width: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-right: 1px solid #000;
        }
        .checkbox-cell input {
            width: 18px;
            height: 18px;
            border: 1px solid #000;
            cursor: pointer;
        }
        .number-cell {
            width: 30px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-right: 1px solid #000;
            font-weight: bold;
        }
        
        /* עיצוב חדש לעמודות של ה-SCHEDULE */
        .task-label {
            width: 60px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-right: 1px solid #000;
            font-size: 14px;
        }
        .cat-input {
            width: 40px;
            border: none;
            outline: none;
            text-align: center;
            font-size: 14px;
        }

        .notes-section {
            direction: rtl;
            padding: 10px;
            min-height: 100px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }
        .total-time-row {
            display: flex;
            align-items: center;
            font-weight: bold;
            font-size: 18px;
        }
        .total-time-row input {
            border-bottom: 1px dashed #000;
            margin-right: 10px;
            font-size: 16px;
            text-align: center;
            width: 100px;
        }
    </style>
</head>
<body>

    <div class="header-title">STUDY PLANNER</div>

    <div class="container">
        <div>
            <div class="box flex-row">
                <div class="yellow-header" style="padding: 8px 15px; border-bottom: none; border-right: 1px solid #000; text-align: left;">DATE:</div>
                <input type="text" id="todayDate" style="flex: 1; padding: 8px;" placeholder="DD/MM/YYYY">
            </div>

            <div class="box">
                <div class="yellow-header">SCHEDULE</div>
                <div class="row">
                    <div class="task-label">Task 1</div>
                    <input type="text" style="flex: 1; border-right: 1px solid #000;">
                    <input type="text" class="cat-input" placeholder="#">
                </div>
                <div class="row">
                    <div class="task-label">Task 2</div>
                    <input type="text" style="flex: 1; border-right: 1px solid #000;">
                    <input type="text" class="cat-input" placeholder="#">
                </div>
                <div class="row">
                    <div class="task-label">Task 3</div>
                    <input type="text" style="flex: 1; border-right: 1px solid #000;">
                    <input type="text" class="cat-input" placeholder="#">
                </div>
                <div class="row">
                    <div class="task-label">Task 4</div>
                    <input type="text" style="flex: 1; border-right: 1px solid #000;">
                    <input type="text" class="cat-input" placeholder="#">
                </div>
                <div class="row">
                    <div class="task-label">Task 5</div>
                    <input type="text" style="flex: 1; border-right: 1px solid #000;">
                    <input type="text" class="cat-input" placeholder="#">
                </div>
                <div class="row">
                    <div class="task-label">Task 6</div>
                    <input type="text" style="flex: 1; border-right: 1px solid #000;">
                    <input type="text" class="cat-input" placeholder="#">
                </div>
            </div>

            <div class="box">
                <div class="yellow-header" style="font-size: 16px;">Todo</div>
                <div class="row"><div class="checkbox-cell"><input type="checkbox"></div><input type="text"></div>
                <div class="row"><div class="checkbox-cell"><input type="checkbox"></div><input type="text"></div>
                <div class="row"><div class="checkbox-cell"><input type="checkbox"></div><input type="text"></div>
                <div class="row"><div class="checkbox-cell"><input type="checkbox"></div><input type="text"></div>
                <div class="row"><div class="checkbox-cell"><input type="checkbox"></div><input type="text"></div>
            </div>
        </div>

        <div>
            <div class="box">
                <div class="yellow-header">STUDY SESSION GOAL</div>
                <input type="text" style="width: 100%; padding: 20px 10px; border: none; outline: none; box-sizing: border-box;">
            </div>

            <div class="box">
                <div class="yellow-header">TODAY'S TOP THREE</div>
                <div class="row"><div class="number-cell">1</div><input type="text"></div>
                <div class="row"><div class="number-cell">2</div><input type="text"></div>
                <div class="row"><div class="number-cell">3</div><input type="text"></div>
            </div>

            <div class="box">
                <div class="flex-row yellow-header" style="padding: 0; justify-content: flex-end;">
                    <div style="width: 90px; padding: 8px; border-right: 1px solid #000; border-left: 1px solid #000;">START TIME</div>
                    <div style="width: 90px; padding: 8px;">FINISH TIME</div>
                </div>
                
                <div class="row">
                    <div class="checkbox-cell" style="width: 40px; border-right: none;"><input type="checkbox"></div>
                    <div class="number-cell" style="width: 30px; border-right: 1px solid #000; font-size: 18px;">1</div>
                    <div style="width: 90px; border-right: 1px solid #000;"><input type="time" style="width: 100%; box-sizing: border-box;"></div>
                    <div style="width: 90px;"><input type="time" style="width: 100%; box-sizing: border-box;"></div>
                </div>
                <div class="row">
                    <div class="checkbox-cell" style="width: 40px; border-right: none;"><input type="checkbox"></div>
                    <div class="number-cell" style="width: 30px; border-right: 1px solid #000; font-size: 18px;">2</div>
                    <div style="width: 90px; border-right: 1px solid #000;"><input type="time" style="width: 100%; box-sizing: border-box;"></div>
                    <div style="width: 90px;"><input type="time" style="width: 100%; box-sizing: border-box;"></div>
                </div>
                <div class="row">
                    <div class="checkbox-cell" style="width: 40px; border-right: none;"><input type="checkbox"></div>
                    <div class="number-cell" style="width: 30px; border-right: 1px solid #000; font-size: 18px;">3</div>
                    <div style="width: 90px; border-right: 1px solid #000;"><input type="time" style="width: 100%; box-sizing: border-box;"></div>
                    <div style="width: 90px;"><input type="time" style="width: 100%; box-sizing: border-box;"></div>
                </div>
            </div>

            <div class="box">
                <div class="yellow-header">BREAK TIMES CHECK LIST</div>
                <div class="flex-row" style="text-align: center;">
                    <div style="flex: 1; padding: 10px; border-right: 1px solid #000;">1</div>
                    <div style="flex: 1; padding: 10px; border-right: 1px solid #000;">2</div>
                    <div style="flex: 1; padding: 10px; border-right: 1px solid #000;">3</div>
                    <div style="flex: 1; padding: 10px; border-right: 1px solid #000;">4</div>
                    <div style="flex: 1; padding: 10px;">5</div>
                </div>
            </div>

            <div class="box">
                <div class="yellow-header">NOTES</div>
                <div class="notes-section">
                    <textarea style="width: 100%; height: 60px; border: none; outline: none; resize: none; font-family: inherit;" placeholder="הערות..."></textarea>
                    <div class="total-time-row">
                        <span>סה״כ למידה שעות</span>
                        <input type="text" id="totalTime" readonly placeholder="--:--">
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Set today's date automatically with slashes
        const dateField = document.getElementById('todayDate');
        const today = new Date();
        const day = String(today.getDate()).padStart(2, '0');
        const month = String(today.getMonth() + 1).padStart(2, '0');
        const year = today.getFullYear();
        dateField.value = `${day}/${month}/${year}`;

        // Auto-fill time inputs when clicked
        const timeInputs = document.querySelectorAll('input[type="time"]');
        timeInputs.forEach(input => {
            input.addEventListener('focus', function() {
                if (this.value === '') {
                    const now = new Date();
                    const hours = String(now.getHours()).padStart(2, '0');
                    const minutes = String(now.getMinutes()).padStart(2, '0');
                    this.value = `${hours}:${minutes}`;
                }
            });
        });
    </script>
</body>
</html>
