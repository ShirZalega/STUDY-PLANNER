<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Study Planner</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #ffffff;
            margin: 20px;
            color: #000;
        }
        .header-title {
            text-align: center;
            letter-spacing: 3px;
            font-weight: bold;
            font-size: 24px;
            margin-bottom: 30px;
        }
        .container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            max-width: 900px;
            margin: 0 auto;
        }
        .box {
            border: 2px solid #000;
            margin-bottom: 20px;
            background: #fff;
        }
        .yellow-header {
            background-color: #fdf1a9; /* Pastel yellow matching the original page */
            padding: 8px;
            font-weight: bold;
            font-size: 14px;
            border-bottom: 2px solid #000;
            text-align: center;
            letter-spacing: 1px;
        }
        .row {
            display: flex;
            border-bottom: 1px solid #000;
        }
        .row:last-child {
            border-bottom: none;
        }
        .row input[type="text"] {
            border: none;
            padding: 8px;
            width: 100%;
            outline: none;
            box-sizing: border-box;
        }
        .row input[type="time"] {
            border: none;
            padding: 8px;
            outline: none;
            font-family: inherit;
        }
        .flex-row {
            display: flex;
        }
        .checkbox-cell {
            width: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-right: 1px solid #000;
        }
        .checkbox-cell input {
            width: 18px;
            height: 18px;
            border: 2px solid #000;
            cursor: pointer;
        }
        .number-cell {
            width: 30px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-right: 1px solid #000;
            font-weight: bold;
        }
        .time-col {
            width: 80px;
            border-right: 1px solid #000;
        }
        
        /* Hebrew notes section */
        .notes-section {
            direction: rtl;
            padding: 10px;
            min-height: 100px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }
        .total-time-row {
            display: flex;
            align-items: center;
            font-weight: bold;
            font-size: 18px;
        }
        .total-time-row input {
            border: none;
            border-bottom: 2px dashed #000;
            margin-right: 10px;
            font-size: 16px;
            text-align: center;
            outline: none;
            width: 100px;
        }
    </style>
</head>
<body>

    <div class="header-title">STUDY PLANNER</div>

    <div class="container">
        <div>
            <div class="box flex-row">
                <div class="yellow-header" style="width: 60px; border-bottom: none; border-right: 2px solid #000;">DATE:</div>
                <input type="date" style="flex: 1; border: none; padding: 5px; outline: none;">
            </div>

            <div class="box">
                <div class="flex-row yellow-header" style="padding: 0;">
                    <div style="width: 80px; padding: 8px; border-right: 2px solid #000;">TIME</div>
                    <div style="flex: 1; padding: 8px;">SCHEDULE</div>
                </div>
                <div class="row"><div class="time-col"><input type="time" style="width: 100%;"></div><input type="text"></div>
                <div class="row"><div class="time-col"><input type="time" style="width: 100%;"></div><input type="text"></div>
                <div class="row"><div class="time-col"><input type="time" style="width: 100%;"></div><input type="text"></div>
                <div class="row"><div class="time-col"><input type="time" style="width: 100%;"></div><input type="text"></div>
                <div class="row"><div class="time-col"><input type="time" style="width: 100%;"></div><input type="text"></div>
                <div class="row"><div class="time-col"><input type="time" style="width: 100%;"></div><input type="text"></div>
            </div>

            <div class="box">
                <div class="yellow-header" style="font-size: 16px;">Todo</div>
                <div class="row"><div class="checkbox-cell"><input type="checkbox"></div><input type="text"></div>
                <div class="row"><div class="checkbox-cell"><input type="checkbox"></div><input type="text"></div>
                <div class="row"><div class="checkbox-cell"><input type="checkbox"></div><input type="text"></div>
                <div class="row"><div class="checkbox-cell"><input type="checkbox"></div><input type="text"></div>
                <div class="row"><div class="checkbox-cell"><input type="checkbox"></div><input type="text"></div>
            </div>
        </div>

        <div>
            <div class="box">
                <div class="yellow-header">STUDY SESSION GOAL</div>
                <input type="text" style="width: 100%; padding: 20px 10px; border: none; outline: none; box-sizing: border-box;">
            </div>

            <div class="box">
                <div class="yellow-header">TODAY'S TOP THREE</div>
                <div class="row"><div class="number-cell">1</div><input type="text"></div>
                <div class="row"><div class="number-cell">2</div><input type="text"></div>
                <div class="row"><div class="number-cell">3</div><input type="text"></div>
            </div>

            <div class="box">
                <div class="flex-row yellow-header" style="padding: 0; justify-content: flex-end;">
                    <div style="width: 90px; padding: 8px; border-right: 2px solid #000; border-left: 2px solid #000;">START TIME</div>
                    <div style="width: 90px; padding: 8px;">FINISH TIME</div>
                </div>
                
                <div class="row">
                    <div class="checkbox-cell" style="width: 40px; border-right: none;"><input type="checkbox"></div>
                    <div class="number-cell" style="width: 30px; border-right: 2px solid #000; font-size: 18px;">1</div>
                    <div style="width: 90px; border-right: 2px solid #000;"><input type="time" style="width: 100%; box-sizing: border-box;"></div>
                    <div style="width: 90px;"><input type="time" style="width: 100%; box-sizing: border-box;"></div>
                </div>
                <div class="row">
                    <div class="checkbox-cell" style="width: 40px; border-right: none;"><input type="checkbox"></div>
                    <div class="number-cell" style="width: 30px; border-right: 2px solid #000; font-size: 18px;">2</div>
                    <div style="width: 90px; border-right: 2px solid #000;"><input type="time" style="width: 100%; box-sizing: border-box;"></div>
                    <div style="width: 90px;"><input type="time" style="width: 100%; box-sizing: border-box;"></div>
                </div>
                <div class="row">
                    <div class="checkbox-cell" style="width: 40px; border-right: none;"><input type="checkbox"></div>
                    <div class="number-cell" style="width: 30px; border-right: 2px solid #000; font-size: 18px;">3</div>
                    <div style="width: 90px; border-right: 2px solid #000;"><input type="time" style="width: 100%; box-sizing: border-box;"></div>
                    <div style="width: 90px;"><input type="time" style="width: 100%; box-sizing: border-box;"></div>
                </div>
            </div>

            <div class="box">
                <div class="yellow-header">BREAK TIMES CHECK LIST</div>
                <div class="flex-row" style="text-align: center;">
                    <div style="flex: 1; padding: 10px; border-right: 1px solid #000;">1</div>
                    <div style="flex: 1; padding: 10px; border-right: 1px solid #000;">2</div>
                    <div style="flex: 1; padding: 10px; border-right: 1px solid #000;">3</div>
                    <div style="flex: 1; padding: 10px; border-right: 1px solid #000;">4</div>
                    <div style="flex: 1; padding: 10px;">5</div>
                </div>
            </div>

            <div class="box">
                <div class="yellow-header">NOTES</div>
                <div class="notes-section">
                    <textarea style="width: 100%; height: 60px; border: none; outline: none; resize: none; font-family: inherit;" placeholder="הערות..."></textarea>
                    <div class="total-time-row">
                        <span>סה״כ למידה שעות</span>
                        <input type="text" id="totalTime" readonly placeholder="--:--">
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Find all input fields of type "time"
        const timeInputs = document.querySelectorAll('input[type="time"]');
        
        // Go through each time input field one by one
        timeInputs.forEach(input => {
            // When the field is clicked or focused...
            input.addEventListener('focus', function() {
                // Check if the field is currently empty
                if (this.value === '') {
                    // Get the current time from the computer
                    const now = new Date();
                    const hours = String(now.getHours()).padStart(2, '0');
                    const minutes = String(now.getMinutes()).padStart(2, '0');
                    
                    // Put the current time into the field
                    this.value = `${hours}:${minutes}`;
                }
            });
        });
    </script>
</body>
</html>
