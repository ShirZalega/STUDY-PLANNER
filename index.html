<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Study Planner</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #ffffff;
            margin: 20px;
            color: #000;
        }
        .header-title {
            text-align: center;
            letter-spacing: 3px;
            font-weight: bold;
            font-size: 24px;
            margin-bottom: 30px;
        }
        .container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            max-width: 900px;
            margin: 0 auto;
        }
        .box {
            border: 1px solid #000;
            margin-bottom: 20px;
            background: #fff;
        }
        .yellow-header {
            background-color: #fdf1a9; 
            padding: 8px;
            font-weight: bold;
            font-size: 14px;
            border-bottom: 1px solid #000;
            text-align: center;
            letter-spacing: 1px;
        }
        input[type="text"], input[type="time"], input[type="number"], textarea {
            font-size: 14px; 
            color: #000;
            border: none;
            outline: none;
            font-family: inherit;
            background: transparent;
        }
        
        /* Center all input text */
        .row input[type="text"], .row input[type="time"], .row input[type="number"], #todayDate {
            text-align: center;
        }

        .row {
            display: flex;
            border-bottom: 1px solid #000;
        }
        .row:last-child {
            border-bottom: none;
        }
        .row input[type="text"] {
            padding: 8px;
            width: 100%;
            box-sizing: border-box;
        }
        .row input[type="time"] {
            padding: 8px;
        }
        .flex-row {
            display: flex;
        }
        .checkbox-cell {
            width: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .checkbox-cell input {
            width: 18px;
            height: 18px;
            border: 1px solid #000;
            cursor: pointer;
        }
        .number-cell {
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
        }
        
        /* Schedule columns */
        .task-label {
            width: 70px; 
            display: flex;
            align-items: center;
            justify-content: center;
            border-right: 1px solid #000;
            font-size: 14px;
        }
        .task-input {
            flex: 1; 
            border-right: 1px solid #000;
        }
        .cat-input {
            width: 50px; 
            font-size: 14px;
        }
        
        /* Hide up/down arrows in number inputs */
        input[type=number]::-webkit-inner-spin-button, 
        input[type=number]::-webkit-outer-spin-button { 
            -webkit-appearance: none; 
            margin: 0; 
        }

        /* Break boxes styling for the interactive 'X' */
        .break-box {
            flex: 1; 
            padding: 10px; 
            border-right: 1px solid #000;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.2s;
        }
        .break-box:last-child {
            border-right: none;
        }
        /* This class creates a red X over the box when added */
        .break-box.crossed {
            background: linear-gradient(to top left, transparent calc(50% - 2px), red, transparent calc(50% + 2px)), 
                        linear-gradient(to top right, transparent calc(50% - 2px), red, transparent calc(50% + 2px));
            color: rgba(0,0,0,0.3); /* Dims the number slightly */
        }
    </style>
</head>
<body>

    <div class="header-title">STUDY PLANNER</div>

    <div class="container">
        <div>
            <div class="box flex-row">
                <div class="yellow-header" style="padding: 8px 15px; border-bottom: none; border-right: 1px solid #000; text-align: left;">DATE:</div>
                <input type="text" id="todayDate" style="flex: 1; padding: 8px;" placeholder="DD/MM/YYYY">
            </div>

            <div class="box">
                <div class="yellow-header">SCHEDULE</div>
                <script>
                    for(let i=1; i<=10; i++) {
                        document.write(`
                        <div class="row">
                            <div class="task-label">Task ${i}</div>
                            <input type="text" class="task-input">
                            <input type="number" min="1" max="10" class="cat-input" placeholder="#">
                        </div>
                        `);
                    }
                </script>
            </div>

            <div class="box">
                <div class="yellow-header" style="font-size: 16px;">Todo</div>
                <div class="row"><div class="checkbox-cell" style="border-right: 1px solid #000;"></div><input type="text"></div>
                <div class="row"><div class="checkbox-cell" style="border-right: 1px solid #000;"><input type="checkbox"></div><input type="text"></div>
                <div class="row"><div class="checkbox-cell" style="border-right: 1px solid #000;"><input type="checkbox"></div><input type="text"></div>
                <div class="row"><div class="checkbox-cell" style="border-right: 1px solid #000;"><input type="checkbox"></div><input type="text"></div>
                <div class="row"><div class="checkbox-cell" style="border-right: 1px solid #000;"><input type="checkbox"></div><input type="text"></div>
            </div>

            <div class="box">
                <div class="yellow-header">REWARD</div>
                <input type="text" style="width: 100%; padding: 20px 10px; border: none; outline: none; box-sizing: border-box; text-align: center;" placeholder="What's your treat today?">
            </div>
        </div>

        <div>
            <div class="box">
                <div class="yellow-header">STUDY SESSION GOAL</div>
                <input type="text" style="width: 100%; padding: 20px 10px; border: none; outline: none; box-sizing: border-box; text-align: center;">
            </div>

            <div class="box">
                <div class="yellow-header">TODAY'S TOP THREE</div>
                <div class="row"><div class="number-cell" style="width: 30px; border-right: 1px solid #000;">1</div><input type="text"></div>
                <div class="row"><div class="number-cell" style="width: 30px; border-right: 1px solid #000;">2</div><input type="text"></div>
                <div class="row"><div class="number-cell" style="width: 30px; border-right: 1px solid #000;">3</div><input type="text"></div>
            </div>

            <div class="box">
                <div class="flex-row yellow-header" style="padding: 0;">
                    <div style="flex: 1;"></div>
                    <div style="width: 90px; padding: 8px; border-left: 1px solid #000; border-right: 1px solid #000; box-sizing: border-box;">START TIME</div>
                    <div style="width: 90px; padding: 8px; box-sizing: border-box;">FINISH TIME</div>
                </div>
                
                <script>
                    for(let i=1; i<=10; i++) {
                        document.write(`
                        <div class="row">
                            <div style="flex: 1; display: flex;">
                                <div class="checkbox-cell"><input type="checkbox"></div>
                                <div class="number-cell" style="flex: 1; font-size: 18px;">${i}</div>
                            </div>
                            <div style="width: 90px; border-left: 1px solid #000; border-right: 1px solid #000; box-sizing: border-box;">
                                <input type="time" class="start-time" style="width: 100%; box-sizing: border-box;">
                            </div>
                            <div style="width: 90px; box-sizing: border-box;">
                                <input type="time" class="finish-time" style="width: 100%; box-sizing: border-box;">
                            </div>
                        </div>
                        `);
                    }
                </script>
            </div>

            <div class="box">
                <div class="yellow-header">BREAK TIMES CHECK LIST</div>
                <div class="flex-row" style="text-align: center;">
                    <div class="break-box">1</div>
                    <div class="break-box">2</div>
                    <div class="break-box">3</div>
                    <div class="break-box">4</div>
                    <div class="break-box">5</div>
                </div>
            </div>

            <div class="box">
                <div class="yellow-header">NOTES</div>
                <div class="flex-row" style="direction: rtl;">
                    <div style="flex: 1; border-left: 1px solid #000; display: flex; flex-direction: column;">
                        <div class="flex-row" style="border-bottom: 1px solid #000; background-color: #f9f9f9;">
                            <div style="flex: 1; text-align: center; font-weight: bold; padding: 8px; border-left: 1px solid #000;">זמן</div>
                            <div style="flex: 1; text-align: center; font-weight: bold; padding: 8px;">מהות</div>
                        </div>
                        <div class="flex-row" style="border-bottom: 1px solid #000;">
                            <input type="time" style="flex: 1; border-left: 1px solid #000; border-bottom: none; text-align: center;">
                            <div style="flex: 1; text-align: center; padding: 8px;">לקיחה</div>
                        </div>
                        <div class="flex-row" style="border-bottom: 1px solid #000;">
                            <input type="time" style="flex: 1; border-left: 1px solid #000; border-bottom: none; text-align: center;">
                            <div style="flex: 1; text-align: center; padding: 8px;">השפעה</div>
                        </div>
                        <div class="flex-row" style="border-bottom: 1px solid #000;">
                            <input type="time" style="flex: 1; border-left: 1px solid #000; border-bottom: none; text-align: center;">
                            <div style="flex: 1; text-align: center; padding: 8px;">תחילה עבודה</div>
                        </div>
                        <div class="flex-row">
                            <input type="time" style="flex: 1; border-left: 1px solid #000; border-bottom: none; text-align: center;">
                            <div style="flex: 1; text-align: center; padding: 8px;">סיום</div>
                        </div>
                    </div>
                    
                    <div style="flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 20px;">
                        <div style="font-weight: bold; font-size: 20px; margin-bottom: 15px; text-align: center;">סה״כ זמן למידה</div>
                        <input type="text" id="totalTime" readonly placeholder="00:00" style="font-size: 28px; font-weight: bold; text-align: center; border-bottom: 2px dashed #000; width: 120px;">
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // 1. Set today's date automatically
        const dateField = document.getElementById('todayDate');
        const today = new Date();
        const day = String(today.getDate()).padStart(2, '0');
        const month = String(today.getMonth() + 1).padStart(2, '0');
        const year = today.getFullYear();
        dateField.value = `${day}/${month}/${year}`;

        // 2. Auto-fill time inputs when clicked
        const timeInputs = document.querySelectorAll('input[type="time"]');
        timeInputs.forEach(input => {
            input.addEventListener('focus', function() {
                if (this.value === '') {
                    const now = new Date();
                    const hours = String(now.getHours()).padStart(2, '0');
                    const minutes = String(now.getMinutes()).padStart(2, '0');
                    this.value = `${hours}:${minutes}`;
                }
            });
        });

        // 3. Smart sync: Copy finish time to the next row's start time
        const finishTimes = document.querySelectorAll('.finish-time');
        const startTimes = document.querySelectorAll('.start-time');

        finishTimes.forEach((finishInput, index) => {
            finishInput.addEventListener('change', function() {
                if (this.value !== '' && index + 1 < startTimes.length) {
                    if (startTimes[index + 1].value === '') {
                        startTimes[index + 1].value = this.value;
                    }
                }
            });
        });

        // 4. Toggle Break Checkmarks (Red 'X')
        const breakBoxes = document.querySelectorAll('.break-box');
        breakBoxes.forEach(box => {
            box.addEventListener('click', function() {
                this.classList.toggle('crossed');
            });
        });

        // 5. Automatic Total Study Time Calculator
        function calculateTotalTime() {
            let totalMinutes = 0;

            for (let i = 0; i < 10; i++) {
                const startVal = startTimes[i].value;
                const finishVal = finishTimes[i].value;

                // Only calculate if both start and finish times exist for this row
                if (startVal && finishVal) {
                    const [startH, startM] = startVal.split(':').map(Number);
                    const [finishH, finishM] = finishVal.split(':').map(Number);

                    let startTotalMins = (startH * 60) + startM;
                    let finishTotalMins = (finishH * 60) + finishM;

                    // Handle cases where studying goes past midnight
                    if (finishTotalMins < startTotalMins) {
                        finishTotalMins += (24 * 60); 
                    }

                    totalMinutes += (finishTotalMins - startTotalMins);
                }
            }

            // Convert total minutes back to HH:MM format
            const finalHours = Math.floor(totalMinutes / 60);
            const finalMins = totalMinutes % 60;
            
            document.getElementById('totalTime').value = 
                `${String(finalHours).padStart(2, '0')}:${String(finalMins).padStart(2, '0')}`;
        }

        // Trigger calculation whenever any start or finish time changes
        startTimes.forEach(input => input.addEventListener('change', calculateTotalTime));
        finishTimes.forEach(input => input.addEventListener('change', calculateTotalTime));
    </script>
</body>
</html>
