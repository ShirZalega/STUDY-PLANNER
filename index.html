<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Study Planner</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #ffffff;
            margin: 20px;
            color: #000;
        }
        .header-title {
            text-align: center;
            letter-spacing: 3px;
            font-weight: bold;
            font-size: 24px;
            margin-bottom: 30px;
        }
        .container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            max-width: 900px;
            margin: 0 auto;
        }
        .box {
            border: 1px solid #000;
            margin-bottom: 20px;
            background: #fff;
        }
        .yellow-header {
            background-color: #fdf1a9; 
            padding: 8px;
            font-weight: bold;
            font-size: 14px;
            border-bottom: 1px solid #000;
            text-align: center;
            letter-spacing: 1px;
        }
        input[type="text"], input[type="time"], input[type="number"], textarea {
            font-size: 14px; 
            color: #000;
            border: none;
            outline: none;
            font-family: inherit;
            background: transparent;
        }
        
        /* Center all input text */
        .row input[type="text"], .row input[type="time"], .row input[type="number"], #todayDate {
            text-align: center;
        }

        .row {
            display: flex;
            border-bottom: 1px solid #000;
        }
        .row:last-child {
            border-bottom: none;
        }
        .row input[type="text"] {
            padding: 8px;
            width: 100%;
            box-sizing: border-box;
        }
        .row input[type="time"] {
            padding: 8px;
        }
        .flex-row {
            display: flex;
        }
        .checkbox-cell {
            width: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .checkbox-cell input {
            width: 18px;
            height: 18px;
            border: 1px solid #000;
            cursor: pointer;
        }
        .number-cell {
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
        }
        
        /* New rules for SCHEDULE columns */
        .task-label {
            width: 70px; /* Narrow left column */
            display: flex;
            align-items: center;
            justify-content: center;
            border-right: 1px solid #000;
            font-size: 14px;
        }
        .task-input {
            flex: 1; /* Wide middle column */
            border-right: 1px solid #000;
        }
        .cat-input {
            width: 50px; /* Narrow right column */
            font-size: 14px;
        }
        
        /* Hide the up/down arrows in the number input for a cleaner look */
        input[type=number]::-webkit-inner-spin-button, 
        input[type=number]::-webkit-outer-spin-button { 
            -webkit-appearance: none; 
            margin: 0; 
        }

        .notes-section {
            direction: rtl;
            padding: 10px;
            min-height: 100px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }
        .total-time-row {
            display: flex;
            align-items: center;
            font-weight: bold;
            font-size: 18px;
        }
        .total-time-row input {
            border-bottom: 1px dashed #000;
            margin-right: 10px;
            font-size: 16px;
            text-align: center;
            width: 100px;
        }
    </style>
</head>
<body>

    <div class="header-title">STUDY PLANNER</div>

    <div class="container">
        <div>
            <div class="box flex-row">
                <div class="yellow-header" style="padding: 8px 15px; border-bottom: none; border-right: 1px solid #000; text-align: left;">DATE:</div>
                <input type="text" id="todayDate" style="flex: 1; padding: 8px;" placeholder="DD/MM/YYYY">
            </div>

            <div class="box">
                <div class="yellow-header">SCHEDULE</div>
                
                <script>
                    for(let i=1; i<=10; i++) {
                        document.write(`
                        <div class="row">
                            <div class="task-label">Task ${i}</div>
                            <input type="text" class="task-input">
                            <input type="number" min="1" max="10" class="cat-input" placeholder="#">
                        </div>
                        `);
                    }
                </script>
            </div>

            <div class="box">
                <div class="yellow-header" style="font-size: 16px;">Todo</div>
                <div class="row"><div class="checkbox-cell" style="border-right: 1px solid #000;"></div><input type="text"></div>
                <div class="row"><div class="checkbox-cell" style="border-right: 1px solid #000;"><input type="checkbox"></div><input type="text"></div>
                <div class="row"><div class="checkbox-cell" style="border-right: 1px solid #000;"><input type="checkbox"></div><input type="text"></div>
                <div class="row"><div class="checkbox-cell" style="border-right: 1px solid #000;"><input type="checkbox"></div><input type="text"></div>
                <div class="row"><div class="checkbox-cell" style="border-right: 1px solid #000;"><input type="checkbox"></div><input type="text"></div>
            </div>
        </div>

        <div>
            <div class="box">
                <div class="yellow-header">STUDY SESSION GOAL</div>
                <input type="text" style="width: 100%; padding: 20px 10px; border: none; outline: none; box-sizing: border-box; text-align: center;">
            </div>

            <div class="box">
                <div class="yellow-header">TODAY'S TOP THREE</div>
                <div class="row"><div class="number-cell" style="width: 30px; border-right: 1px solid #000;">1</div><input type="text"></div>
                <div class="row"><div class="number-cell" style="width: 30px; border-right: 1px solid #000;">2</div><input type="text"></div>
                <div class="row"><div class="number-cell" style="width: 30px; border-right: 1px solid #000;">3</div><input type="text"></div>
            </div>

            <div class="box">
                <div class="flex-row yellow-header" style="padding: 0;">
                    <div style="flex: 1;"></div>
                    <div style="width: 90px; padding: 8px; border-left: 1px solid #000; border-right: 1px solid #000; box-sizing: border-box;">START TIME</div>
                    <div style="width: 90px; padding: 8px; box-sizing: border-box;">FINISH TIME</div>
                </div>
                
                <script>
                    for(let i=1; i<=10; i++) {
                        document.write(`
                        <div class="row">
                            <div style="flex: 1; display: flex;">
                                <div class="checkbox-cell"><input type="checkbox"></div>
                                <div class="number-cell" style="flex: 1; font-size: 18px;">${i}</div>
                            </div>
                            <div style="width: 90px; border-left: 1px solid #000; border-right: 1px solid #000; box-sizing: border-box;">
                                <input type="time" class="start-time" style="width: 100%; box-sizing: border-box;">
                            </div>
                            <div style="width: 90px; box-sizing: border-box;">
                                <input type="time" class="finish-time" style="width: 100%; box-sizing: border-box;">
                            </div>
                        </div>
                        `);
                    }
                </script>
            </div>

            <div class="box">
                <div class="yellow-header">BREAK TIMES CHECK LIST</div>
                <div class="flex-row" style="text-align: center;">
                    <div style="flex: 1; padding: 10px; border-right: 1px solid #000;">1</div>
                    <div style="flex: 1; padding: 10px; border-right: 1px solid #000;">2</div>
                    <div style="flex: 1; padding: 10px; border-right: 1px solid #000;">3</div>
                    <div style="flex: 1; padding: 10px; border-right: 1px solid #000;">4</div>
                    <div style="flex: 1; padding: 10px;">5</div>
                </div>
            </div>

            <div class="box">
                <div class="yellow-header">NOTES</div>
                <div class="notes-section">
                    <textarea style="width: 100%; height: 60px; border: none; outline: none; resize: none; font-family: inherit;" placeholder="Notes..."></textarea>
                    <div class="total-time-row">
                        <span>Total Study Hours</span>
                        <input type="text" id="totalTime" readonly placeholder="--:--">
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Automatically set today's date formatted with slashes
        const dateField = document.getElementById('todayDate');
        const today = new Date();
        const day = String(today.getDate()).padStart(2, '0');
        const month = String(today.getMonth() + 1).padStart(2, '0');
        const year = today.getFullYear();
        dateField.value = `${day}/${month}/${year}`;

        // Auto-fill time inputs with current time when clicked
        const timeInputs = document.querySelectorAll('input[type="time"]');
        timeInputs.forEach(input => {
            input.addEventListener('focus', function() {
                if (this.value === '') {
                    const now = new Date();
                    const hours = String(now.getHours()).padStart(2, '0');
                    const minutes = String(now.getMinutes()).padStart(2, '0');
                    this.value = `${hours}:${minutes}`;
                }
            });
        });

        // Smart sync: Copy finish time to the next row's start time
        const finishTimes = document.querySelectorAll('.finish-time');
        const startTimes = document.querySelectorAll('.start-time');

        finishTimes.forEach((finishInput, index) => {
            finishInput.addEventListener('change', function() {
                if (this.value !== '' && index + 1 < startTimes.length) {
                    if (startTimes[index + 1].value === '') {
                        startTimes[index + 1].value = this.value;
                    }
                }
            });
        });
    </script>
</body>
</html>
